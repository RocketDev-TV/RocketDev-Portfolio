<!-- Formulario de Contacto -->
<section class="p-8 bg-zinc-950">
  <form action="https://formspree.io/f/TU_ID_AQUÍ" method="POST" class="max-w-md mx-auto space-y-4">
    <input type="text" name="name" placeholder="Tu Nombre" class="w-full p-2 bg-zinc-800 border border-zinc-700 rounded text-white" required>
    <input type="email" name="email" placeholder="Tu Correo" class="w-full p-2 bg-zinc-800 border border-zinc-700 rounded text-white" required>
    <textarea name="message" placeholder="¿En qué puedo ayudarte?" class="w-full p-2 bg-zinc-800 border border-zinc-700 rounded text-white h-32"></textarea>
    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 p-2 rounded font-bold transition">Enviar Mensaje</button>
  </form>
</section>
